#
# OpenOCD adapter config for FTDI FT2232H (UM232H module)
# Target: Lattice ispLSI 2032 CPLD
#
# WARNING: Only ispLSI2032V/VL (3.3V) variants work with UM232H directly.
# The original 2032/2032A/2032E are 5V — need level shifter!
#
# VID/PID 0x0403:0x6010 (FT2232H dual-channel, using channel A)
#

adapter driver ftdi
ftdi vid_pid 0x0403 0x6010

ftdi layout_init 0xfff8 0xfffb
ftdi layout_signal nTRST -data 0x0100 -oe 0x0100
ftdi layout_signal nSRST -data 0x0200 -oe 0x0200

# UM232H        FT2232H   JTAG
# Name  Pin     Name      Func
# AD0   J2-6    ADBUS0    TCK
# AD1   J2-7    ADBUS1    TDI
# AD2   J2-8    ADBUS2    TDO
# AD3   J2-9    ADBUS3    TMS
# AC0   J1-14   ACBUS0    nTRST
# AC1   J1-13   ACBUS1    nSRST
