#
# OpenOCD adapter config for FTDI FT2232H
# Target: Lattice ispLSI 2032 CPLD (all variants)
#
# FT2232H I/O is +5V tolerant (datasheet: "+3.3V I/O interfacing (+5V Tolerant)")
# Direct connection to both 3.3V and 5V ispLSI2032 — NO level shifter needed!
# Output HIGH = 3.3V, accepted by 5V CMOS as HIGH (VIH >= 2.0V)
# Input tolerates 5V from chip TDO — safe per spec
#
# VID/PID 0x0403:0x6010 (FT2232H dual-channel, using channel A)
#

adapter driver ftdi
ftdi vid_pid 0x0403 0x6010

ftdi layout_init 0xfff8 0xfffb
ftdi layout_signal nTRST -data 0x0100 -oe 0x0100
ftdi layout_signal nSRST -data 0x0200 -oe 0x0200

# FT2232H       JTAG
# Name          Func
# AD0   J2-6    ADBUS0    TCK
# AD1   J2-7    ADBUS1    TDI
# AD2   J2-8    ADBUS2    TDO
# AD3   J2-9    ADBUS3    TMS
# AC0   J1-14   ACBUS0    nTRST
# AC1   J1-13   ACBUS1    nSRST
